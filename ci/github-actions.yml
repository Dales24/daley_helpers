# Mock CI pipeline. Copy to .github/workflows/ci.yml to activate.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 pytest

      - name: Lint
        run: |
          black --check python/ testing/
          flake8 python/ testing/

      - name: Test
        run: pytest -q testing/
